<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JobPortal - Find Your Dream Job</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="container header-content">
            <div class="logo">
                <span class="icon">💼</span>
                <h1>JobPortal</h1>
            </div>
            <nav class="nav">
                <a href="#">Home</a>
                <a href="#">Jobs</a>
                <a href="#">About</a>
                <a href="#">Contact</a>
            </nav>
            <div class="auth-buttons">
                <button class="btn-outline">Login</button>
                <button class="btn-primary">Sign Up</button>
            </div>
        </div>
    </header>

    <!-- Hero Section -->
    <section class="hero">
        <div class="container hero-content">
            <div class="hero-text">
                <h2 class="hero-title">Find Your Dream Job Today</h2>
                <p class="hero-subtitle">Thousands of jobs waiting for you</p>
                
                <!-- Search Bar -->
                <div class="search-bar">
                    <div class="search-input">
                        <span class="search-icon">🔍</span>
                        <input type="text" placeholder="Job title or keyword">
                    </div>
                    <div class="search-input">
                        <span class="search-icon">📍</span>
                        <input type="text" placeholder="Location">
                    </div>
                    <button class="btn-search">Search</button>
                </div>
            </div>
            
            <div class="hero-image">
                <img src="ApnaHeroNew.png" alt="Professional job seeker">
            </div>
        </div>
    </section>

    <!-- Stats Section -->
    <section class="stats">
        <div class="container stats-grid">
            <div class="stat-item">
                <div class="stat-number">1000+</div>
                <div class="stat-label">Jobs Available</div>
            </div>
            <div class="stat-item">
                <div class="stat-number">500+</div>
                <div class="stat-label">Companies</div>
            </div>
            <div class="stat-item">
                <div class="stat-number">2000+</div>
                <div class="stat-label">Job Seekers</div>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="footer">
        
            <div class="footer-column">
                <h4>Company</h4>
                <ul>
                    <li><a href="#">About Us</a></li>
                    <li><a href="#">Contact</a></li>
                    <li><a href="#">Privacy Policy</a></li>
                </ul>
            </div>
        </div>
        <div class="footer-bottom">
            <p>&copy; 2026 JobPortal. All rights reserved.</p>
        </div>
    </footer>
</body>
</html>
